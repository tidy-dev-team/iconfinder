<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Icon Finder</title>
  <style>
    /* ── Tokens ── */
    :root {
      --bg:           #1e1e1e;
      --bg-card:      #252525;
      --bg-tag:       #2a2a2a;
      --bg-badge:     #2e2e2e;
      --border:       #333333;
      --border-sub:   #2e2e2e;
      --border-tag:   #3a3a3a;
      --border-dash:  #3a3a3a;
      --text-1:       #ffffff;
      --text-2:       #e0e0e0;
      --text-3:       #aaaaaa;
      --text-4:       #888888;
      --text-5:       #666666;
      --text-6:       #555555;
      --text-tag:     #bbbbbb;
      --text-badge:   #777777;
      --text-code:    #cccccc;
      --accent:       #9575ff;
      --accent-hover: #a78bff;
      --accent-act:   #7c4dff;
      --accent-bg:    rgba(149, 117, 255, 0.12);
      --preview-bg:   #ffffff;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:           #f5f5f5;
        --bg-card:      #ffffff;
        --bg-tag:       #eeeeee;
        --bg-badge:     #eeeeee;
        --border:       #e0e0e0;
        --border-sub:   #ebebeb;
        --border-tag:   #d8d8d8;
        --border-dash:  #cccccc;
        --text-1:       #111111;
        --text-2:       #222222;
        --text-3:       #555555;
        --text-4:       #777777;
        --text-5:       #999999;
        --text-6:       #aaaaaa;
        --text-tag:     #444444;
        --text-badge:   #666666;
        --text-code:    #333333;
        --accent:       #7c4dff;
        --accent-hover: #9575ff;
        --accent-act:   #6a3de8;
        --accent-bg:    rgba(124, 77, 255, 0.08);
        --preview-bg:   #f0f0f0;
      }
    }

    /* ── Reset ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      background: var(--bg);
      color: var(--text-2);
    }

    .content {
      padding: 12px 16px;
    }

    /* ── States ── */
    .state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 24px; gap: 12px;
      color: var(--text-5); text-align: center; line-height: 1.6;
    }
    .state-icon {
      width: 44px; height: 44px;
      border: 2px dashed var(--border-dash); border-radius: 10px;
    }
    .state a    { color: var(--accent-hover); text-decoration: none; font-weight: 500; }
    .state code {
      background: var(--bg-tag); border: 1px solid var(--border-tag);
      border-radius: 4px; padding: 2px 6px;
      font-size: 11px; font-family: monospace; color: var(--text-code);
    }
    .spinner { color: var(--accent); font-size: 11px; text-align: center; padding: 32px; }


    /* ── Card base ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .card-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-5);
      padding: 9px 12px 0;
    }

    /* ── Result group ── */
    .result-group { margin-bottom: 4px; }
    .result-group + .result-group {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-sub);
    }

    /* ── Selection card ── */
    .sel-body {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px 12px;
    }
    .sel-preview {
      width: 44px; height: 44px;
      background: var(--preview-bg); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .sel-preview img { width: 36px; height: 36px; object-fit: contain; }
    .sel-info { flex: 1; min-width: 0; }
    .sel-name {
      font-size: 13px; font-weight: 600; color: var(--text-1);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .type-badge {
      display: inline-block; margin-top: 4px;
      font-size: 10px; color: var(--text-badge);
      background: var(--bg-badge); padding: 2px 6px; border-radius: 4px;
    }

    /* ── Best Guess card ── */
    .best-body {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px 12px;
    }
    .icon-lg {
      width: 44px; height: 44px;
      background: var(--preview-bg); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .icon-lg svg { display: block; color: #333; }
    .best-info { flex: 1; min-width: 0; }
    .best-lib {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: var(--text-1);
    }
    .ext-link {
      font-size: 12px; color: var(--accent);
      text-decoration: none; flex-shrink: 0; line-height: 1;
      border-radius: 3px; padding: 1px 2px;
      transition: color 0.1s;
    }
    .ext-link:hover { color: var(--accent-hover); }
    .best-icon-name {
      font-size: 11px; color: var(--text-4); margin-top: 3px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .conf-badge {
      font-size: 11px; font-weight: 600; color: var(--accent);
      background: var(--accent-bg);
      padding: 4px 8px; border-radius: 6px; flex-shrink: 0;
    }

    /* ── Other guesses grid ── */
    .others-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }
    .other-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px 9px;
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      text-align: center;
      min-width: 0; overflow: hidden;
    }
    .icon-sm {
      width: 32px; height: 32px;
      background: var(--preview-bg); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .icon-sm svg { display: block; color: #333; }
    .other-lib-row {
      display: flex; align-items: center; justify-content: center; gap: 3px;
      width: 100%;
    }
    .other-lib-name {
      font-size: 10px; font-weight: 500; color: var(--text-3);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: calc(100% - 16px);
    }
    .ext-link-sm {
      font-size: 10px; color: var(--accent);
      text-decoration: none; flex-shrink: 0; line-height: 1;
      transition: color 0.1s;
    }
    .ext-link-sm:hover { color: var(--accent-hover); }
    .other-icon-name {
      font-size: 10px; color: var(--text-5);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 100%;
    }

    /* ── Summary bar ── */
    #summary-bar {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border-sub);
      padding: 8px 16px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    }
    .summary-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg-tag); border: 1px solid var(--border-tag);
      border-radius: 20px; padding: 3px 8px 3px 10px;
      font-size: 11px; color: var(--text-3);
    }
    .summary-count {
      background: var(--accent-bg); color: var(--accent);
      border-radius: 10px; padding: 1px 6px;
      font-size: 10px; font-weight: 600;
    }

    /* ── Inline messages ── */
    .no-match  { padding: 12px; color: var(--text-6); font-style: italic; }
    .error-msg { padding: 12px; color: #e53935; font-size: 11px; }
  </style>
</head>
<body>

<div id="summary-bar" style="display:none"></div>
<div class="content" id="content">
  <div class="state">
    <div class="state-icon"></div>
    <p>Select icons in Figma and click <strong>Analyze Selection</strong>.</p>
  </div>
</div>


<!-- ICON_DB_PLACEHOLDER -->

<script>
// ─── pHash (mirrors build-db.js) ─────────────────────────────────────────────

function computePHash(pixels) {
  const S = 32, D = 8;
  const cos = Array.from({ length: D }, (_, u) =>
    Array.from({ length: S }, (_, x) =>
      Math.cos(((2 * x + 1) * u * Math.PI) / (2 * S))
    )
  );

  const dct = new Float32Array(D * D);
  for (let u = 0; u < D; u++) {
    for (let v = 0; v < D; v++) {
      let sum = 0;
      for (let x = 0; x < S; x++) {
        const cu = cos[u][x];
        for (let y = 0; y < S; y++) sum += pixels[x * S + y] * cu * cos[v][y];
      }
      dct[u * D + v] = sum;
    }
  }

  const ac = dct.slice(1);
  const sorted = Float32Array.from(ac).sort();
  const median = sorted[(sorted.length - 1) >> 1];

  const bytes = new Uint8Array(8);
  for (let i = 0; i < 63; i++) {
    if (ac[i] > median) bytes[i >> 3] |= 0x80 >> (i & 7);
  }
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ─── Hash a PNG byte array using Canvas ──────────────────────────────────────

function pngBytesToHash(pngBytes) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([new Uint8Array(pngBytes)], { type: 'image/png' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      canvas.width = 32; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 32, 32);
      ctx.drawImage(img, 0, 0, 32, 32);
      const data = ctx.getImageData(0, 0, 32, 32).data;
      const pixels = new Float32Array(32 * 32);
      for (let i = 0; i < 1024; i++) {
        pixels[i] = 0.299 * data[i * 4] + 0.587 * data[i * 4 + 1] + 0.114 * data[i * 4 + 2];
      }
      resolve(computePHash(pixels));
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ─── Database lookup ─────────────────────────────────────────────────────────

const POPCOUNT = new Uint8Array(256);
for (let i = 1; i < 256; i++) POPCOUNT[i] = (i & 1) + POPCOUNT[i >> 1];

function hammingDist(h1, h2) {
  let d = 0;
  for (let i = 0; i < 16; i += 2) {
    d += POPCOUNT[parseInt(h1.substr(i, 2), 16) ^ parseInt(h2.substr(i, 2), 16)];
  }
  return d;
}

const MAX_DIST = 15;

function queryDB(hash, topN = 6) {
  if (typeof window.ICON_DB === 'undefined') return null;

  const { l: libs, v: vars, d: data } = window.ICON_DB;
  const heap = [];

  for (const entry of data) {
    const dist = hammingDist(hash, entry[0]);
    if (heap.length < topN) {
      heap.push([dist, entry]);
      if (heap.length === topN) heap.sort((a, b) => b[0] - a[0]);
    } else if (dist < heap[0][0]) {
      heap[0] = [dist, entry];
      heap.sort((a, b) => b[0] - a[0]);
    }
  }

  return heap
    .sort((a, b) => a[0] - b[0])
    .filter(([dist]) => dist <= MAX_DIST)
    .map(([dist, entry]) => ({
      library:    libs[entry[1]],
      name:       entry[2],
      variant:    vars[entry[3]],
      distance:   dist,
      confidence: Math.max(0, Math.round(100 - dist * 6)),
      svgInner:   entry[4] || '',
      isStroke:   entry[5] || 0,
      sw:         entry[6] || 2,
      vb:         entry[7] || '0 0 24 24',
    }));
}

// ─── Library URL map ─────────────────────────────────────────────────────────

const LIBRARY_LINKS = {
  'Tabler Icons':          (name) => `https://tabler.io/icons/${encodeURIComponent(name)}`,
  'Lucide':                (name) => `https://lucide.dev/icons/${encodeURIComponent(name)}`,
  'Feather Icons':         ()     => `https://feathericons.com/`,
  'Bootstrap Icons':       (name) => `https://icons.getbootstrap.com/icons/${encodeURIComponent(name)}/`,
  'Material Design Icons': (name) => `https://materialdesignicons.com/icon/${encodeURIComponent(name)}`,
  'Phosphor Icons':        (name) => `https://phosphoricons.com/?q=${encodeURIComponent(name)}`,
  'Remix Icons':           ()     => `https://remixicon.com/`,
};

function libraryLink(library, iconName) {
  const fn = LIBRARY_LINKS[library];
  return fn ? fn(iconName) : null;
}

// ─── Rendering ───────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function buildIconSVG(match, size) {
  if (!match.svgInner) return '';
  const vb = match.vb || '0 0 24 24';
  if (match.isStroke) {
    return `<svg viewBox="${vb}" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="${match.sw || 2}" stroke-linecap="round" stroke-linejoin="round">${match.svgInner}</svg>`;
  }
  return `<svg viewBox="${vb}" width="${size}" height="${size}" fill="currentColor">${match.svgInner}</svg>`;
}

function pngBytesToDataURL(bytes) {
  const b64 = btoa(String.fromCharCode(...new Uint8Array(bytes)));
  return `data:image/png;base64,${b64}`;
}

function renderCards(results) {
  const content = document.getElementById('content');
  const summaryBar = document.getElementById('summary-bar');

  // Build library counts from best guesses
  const libCounts = {};
  for (const r of results) {
    if (r.matches && r.matches.length > 0) {
      const lib = r.matches[0].library;
      libCounts[lib] = (libCounts[lib] || 0) + 1;
    }
  }

  if (results.length > 1 && Object.keys(libCounts).length > 0) {
    summaryBar.innerHTML = Object.entries(libCounts)
      .map(([lib, count]) => `<span class="summary-pill">${esc(lib)}<span class="summary-count">${count}</span></span>`)
      .join('');
    summaryBar.style.display = 'flex';
  } else {
    summaryBar.style.display = 'none';
  }

  let html = '';

  for (const r of results) {
    html += `<div class="result-group">`;

    // 1. Selection card
    html += `<div class="card">
      <div class="card-label">Selection</div>
      <div class="sel-body">
        <div class="sel-preview">${r.previewUrl ? `<img src="${r.previewUrl}" />` : ''}</div>
        <div class="sel-info">
          <div class="sel-name" title="${esc(r.name)}">${esc(r.name)}</div>
          <span class="type-badge">${esc(r.type)}</span>
        </div>
      </div>
    </div>`;

    if (r.error) {
      html += `<div class="card"><div class="error-msg">${esc(r.error)}</div></div>`;
    } else if (!r.matches || r.matches.length === 0) {
      if (typeof window.ICON_DB === 'undefined') {
        html += `<div class="no-match">Database not built — run <code>npm run build:db</code></div>`;
      } else {
        html += `<div class="no-match">No match found in database</div>`;
      }
    } else {
      const top = r.matches[0];
      const topSVG = buildIconSVG(top, 32);
      const topLink = libraryLink(top.library, top.name);

      // 2. Best Guess card
      html += `<div class="card">
        <div class="card-label">Best Guess</div>
        <div class="best-body">
          <div class="icon-lg">${topSVG}</div>
          <div class="best-info">
            <div class="best-lib">
              <span>${esc(top.library)}</span>
              ${topLink ? `<a href="${esc(topLink)}" target="_blank" rel="noopener" class="ext-link">↗</a>` : ''}
            </div>
            <div class="best-icon-name" title="${esc(top.name)}${top.variant ? ` · ${esc(top.variant)}` : ''}">${esc(top.name)}${top.variant ? ` · ${esc(top.variant)}` : ''}</div>
          </div>
        </div>
      </div>`;

      // 3. Other guesses
      const others = r.matches.slice(1);
      if (others.length) {
        html += `<div class="card-label" style="padding: 0 0 6px; margin-top: 24px;">Second Bests</div>`;
        html += `<div class="others-grid">`;
        for (const m of others) {
          const mSVG = buildIconSVG(m, 22);
          const mLink = libraryLink(m.library, m.name);
          html += `<div class="other-card">
            <div class="icon-sm">${mSVG}</div>
            <div class="other-lib-row">
              <span class="other-lib-name" title="${esc(m.library)}">${esc(m.library)}</span>
              ${mLink ? `<a href="${esc(mLink)}" target="_blank" rel="noopener" class="ext-link-sm">↗</a>` : ''}
            </div>
            <div class="other-icon-name" title="${esc(m.name)}${m.variant ? ` · ${esc(m.variant)}` : ''}">${esc(m.name)}${m.variant ? ` · ${esc(m.variant)}` : ''}</div>
          </div>`;
        }
        html += `</div>`;
      }
    }

    html += `</div>`; // end result-group
  }

  content.innerHTML = html;
  fitWindow();
}

// ─── Dynamic window sizing ───────────────────────────────────────────────────

function fitWindow() {
  const bar = document.getElementById('summary-bar');
  const content = document.getElementById('content');
  const h = bar.offsetHeight + content.offsetHeight;
  parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
}

// ─── Message handling ─────────────────────────────────────────────────────────

window.onmessage = async (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  const content = document.getElementById('content');

  if (msg.type === 'no-selection') {
    document.getElementById('summary-bar').style.display = 'none';
    content.innerHTML = `<div class="state"><div class="state-icon"></div>
      <p>Nothing selected. Select one or more icons.</p></div>`;
    fitWindow();

  } else if (msg.type === 'loading') {
    document.getElementById('summary-bar').style.display = 'none';
    content.innerHTML = `<div class="spinner">Exporting…</div>`;
    fitWindow();

  } else if (msg.type === 'analyze-png') {
    content.innerHTML = `<div class="spinner">Computing hashes…</div>`;

    const results = [];
    for (const node of msg.nodes) {
      if (!node.png) {
        results.push({ name: node.name, type: node.type, error: node.error || 'Export failed', matches: [] });
        continue;
      }

      try {
        const hash = await pngBytesToHash(node.png);
        const matches = queryDB(hash) || [];
        const previewUrl = pngBytesToDataURL(node.png);
        results.push({ name: node.name, type: node.type, matches, previewUrl });
      } catch (e) {
        results.push({ name: node.name, type: node.type, error: String(e), matches: [] });
      }
    }

    renderCards(results);
  }
};
</script>
</body>
</html>
